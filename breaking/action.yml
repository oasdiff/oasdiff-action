name: 'Check for API breaking changes'
description: 'Detect breaking changes'
inputs:
  base:
    description: 'Path of original OpenAPI spec in YAML or JSON format'
    required: true
  revision:
    description: 'Path of revised OpenAPI spec in YAML or JSON format'
    required: true
  fail-on:
    description: 'Fail with exit code 1 if any breaking changes are found at severity level, such as ERR or WARN'
    required: false
    default: ''
  include-checks:
    description: 'Include any of the defined optional breaking changes checks'
    required: false
  include-path-params:
    description: 'Include path parameter names in endpoint matching'
    required: false
    default: 'false'
  deprecation-days-beta:
    description: 'Consider minimum sunset period for deprecation of beta API endpoints'
    required: false
  deprecation-days-stable:
    description: 'Consider minimum sunset period for deprecation of stable API endpoints'
    required: false
  exclude-elements:
    description: 'Exclude certain kinds of changes'
    required: false
    default: ''
  filter-extension:
    description: 'Exclude paths and operations with an OpenAPI Extension matching the given regular expression'
    required: false
    default: ''
  composed:
    description: 'Run in composed mode'
    required: false
    default: 'false'
  flatten-allof:
    description: 'Merge allOf subschemas into a single schema before diff'
    required: false
    default: 'false'
  err-ignore:
    description: 'Path to a file containing regex patterns for error-level changes to ignore'
    required: false
    default: ''
  warn-ignore:
    description: 'Path to a file containing regex patterns for warning-level changes to ignore'
    required: false
    default: ''
  output-to-file:
    description: 'Output to a file at the given path'
    required: false
    default: ''
  allow-external-refs:
    description: 'Allow external $refs in the spec; disable to prevent SSRF when processing untrusted specs. Defaults to false (safe for CI on untrusted pull requests).'
    required: false
    default: 'false'
  review:
    description: 'Upload the comparison to oasdiff.com (encrypted, zero-knowledge) and link straight to a side-by-side review of these changes. The specs are encrypted client-side and the key stays in the URL fragment, so the server cannot read them. Set to false to skip the upload entirely, so no spec leaves CI; the change detection and inline annotations are unaffected.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token used to post the review link as a pull-request comment, so reviewers see it on the PR instead of only in the job summary. Defaults to the built-in github.token, so the comment is posted automatically when the job grants permissions: pull-requests: write. Set to an empty string to disable the comment (the link then appears only in the job summary). On fork pull requests the token is read-only, so commenting is skipped and the link falls back to the job summary.'
    required: false
    default: ${{ github.token }}
outputs:
  breaking:
    description: 'Output summary of API breaking changes, encompassing both warnings and errors'
  review_url:
    description: 'URL of the free oasdiff review page for these changes (empty when there are no breaking changes)'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.base }}
    - ${{ inputs.revision }}
    - ${{ inputs.fail-on }}
    - ${{ inputs.include-checks }}
    - ${{ inputs.include-path-params }}
    - ${{ inputs.deprecation-days-beta }}
    - ${{ inputs.deprecation-days-stable }}
    - ${{ inputs.exclude-elements }}
    - ${{ inputs.filter-extension }}
    - ${{ inputs.composed }}
    - ${{ inputs.flatten-allof }}
    - ${{ inputs.err-ignore }}
    - ${{ inputs.warn-ignore }}
    - ${{ inputs.output-to-file }}
    - ${{ inputs.allow-external-refs }}
    - ${{ inputs.review }}
    - ${{ inputs.github-token }}
