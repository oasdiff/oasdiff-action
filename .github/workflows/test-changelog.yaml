name: changelog
on:
  pull_request:
  push:
jobs:
  oasdiff_changelog:
    runs-on: ubuntu-latest
    name: Test generation of changelog
    env:
      OASDIFF_ACTION_TEST_EXPECTED_OUTPUT: "21 changes: 2 error, 4 warning, 15 info"
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Running changelog action
        id: test_changelog
        uses: ./changelog
        with:
          base: https://raw.githubusercontent.com/oasdiff/oasdiff/main/data/openapi-test1.yaml
          revision: https://raw.githubusercontent.com/oasdiff/oasdiff/main/data/openapi-test3.yaml
          output-to-file: "changelog.txt"
      - name: Test changelog action output
        run: |
          output=$(echo "${{steps.test_changelog.outputs.changelog}}" | head -n 1)
          if [[  "${output}" != "${OASDIFF_ACTION_TEST_EXPECTED_OUTPUT}" ]]; then
            echo "Expected output '$OASDIFF_ACTION_TEST_EXPECTED_OUTPUT' but got '${output}'" >&2
            exit 1
          fi
      - name: Test changelog action output to file
        run: |
          if [ ! -s changelog.txt ]; then
            echo "Changelog file doesn't exist or is empty"
            exit 1
          fi
          output=$(cat changelog.txt | head -n 1)
          if [[  "${output}" != "${OASDIFF_ACTION_TEST_EXPECTED_OUTPUT}" ]]; then
            echo "Expected output '$OASDIFF_ACTION_TEST_EXPECTED_OUTPUT' but got '${output}'" >&2
            exit 1
          fi
  oasdiff_changelog_composed:
    runs-on: ubuntu-latest
    name: Test changelog action with composed option
    steps:
        - name: checkout
          uses: actions/checkout@v6
        - name: Running changelog action with composed option
          id: test_changelog_composed
          uses: ./changelog
          with:
            base: 'specs/glob/base/*.yaml'
            revision: 'specs/glob/revision/*.yaml'
            composed: true
        - name: Test changelog action output
          run: |
            delimiter=$(cat /proc/sys/kernel/random/uuid | tr -d '-')
            output=$(cat <<-$delimiter
            ${{ steps.test_changelog_composed.outputs.changelog }}
            $delimiter
            )
            if [[ ! "$output" =~ "1 changes: 1 error, 0 warning, 0 info" ]]; then
              echo "Expected '1 changes: 1 error, 0 warning, 0 info', instead got '$output'" >&2
              exit 1
            fi
  oasdiff_changelog_yaml_config_level:
    runs-on: ubuntu-latest
    name: Test changelog action picks up level from .oasdiff.yaml
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Drop .oasdiff.yaml at repo root
        run: |
          cat > .oasdiff.yaml <<EOF
          level: ERR
          EOF
      - name: Running changelog action without level input
        id: test_yaml_level
        uses: ./changelog
        with:
          base: https://raw.githubusercontent.com/oasdiff/oasdiff/main/data/openapi-test1.yaml
          revision: https://raw.githubusercontent.com/oasdiff/oasdiff/main/data/openapi-test3.yaml
      - name: Assert level filter from .oasdiff.yaml suppressed warning/info findings
        run: |
          # Without the YAML, the same specs produce "21 changes: 2 error, 4 warning, 15 info".
          # With level: ERR in YAML, only the 2 errors should remain.
          output=$(echo "${{ steps.test_yaml_level.outputs.changelog }}" | head -n 1)
          if [[ "$output" != "2 changes: 2 error, 0 warning, 0 info" ]]; then
            echo "Expected '2 changes: 2 error, 0 warning, 0 info' (level: ERR from .oasdiff.yaml) but got '$output'" >&2
            exit 1
          fi

  changelog_free_review_url_preserves_https_base:
    runs-on: ubuntu-latest
    name: Test changelog free review URL keeps the https:// scheme on URL-style base
    # Regression test for the bug fixed in pr-comment (#120): a URL-shaped base
    # must survive intact in the review URL's base_file. Runs the real action in
    # its Alpine container (the production platform) and asserts on the
    # review_url output.
    steps:
      - uses: actions/checkout@v6
      - uses: ./changelog
        id: clog
        with:
          base: 'https://raw.githubusercontent.com/oasdiff/oasdiff/main/data/openapi-test1.yaml'
          revision: 'https://raw.githubusercontent.com/oasdiff/oasdiff/main/data/openapi-test3.yaml'
      - name: Assert the full https:// URL is preserved in base_file
        env:
          REVIEW_URL: ${{ steps.clog.outputs.review_url }}
        run: |
          set -euo pipefail
          echo "review_url=$REVIEW_URL"
          if [ -z "$REVIEW_URL" ]; then
            echo "FAIL: review_url output is empty (expected changes to fire the notice)" >&2
            exit 1
          fi
          if printf '%s' "$REVIEW_URL" | grep -q 'base_file=https%3A%2F%2Fraw.githubusercontent.com'; then
            echo "PASS: full https://raw... URL preserved in base_file"
          elif printf '%s' "$REVIEW_URL" | grep -q 'base_file=%2F%2Fraw.githubusercontent.com'; then
            echo "FAIL: 'https:' was stripped from base, the strip_ref_prefix URL guard is missing" >&2
            exit 1
          else
            echo "FAIL: base_file= did not contain the raw.githubusercontent.com host as expected" >&2
            exit 1
          fi

  changelog_free_review_url_strips_git_ref_prefix:
    runs-on: ubuntu-latest
    name: "Test changelog free review URL strips the ref: prefix from a git-ref base"
    # Companion to the preserve test: a git-ref base (HEAD:specs/base.yaml) must
    # have its ref prefix stripped so base_file is just the path. Also exercises
    # real git-ref resolution, the action's recommended base form.
    steps:
      - uses: actions/checkout@v6
      - uses: ./changelog
        id: clog
        with:
          base: 'HEAD:specs/base.yaml'
          revision: 'specs/revision-breaking.yaml'
      - name: Assert the git-ref prefix is stripped from base_file
        env:
          REVIEW_URL: ${{ steps.clog.outputs.review_url }}
        run: |
          set -euo pipefail
          echo "review_url=$REVIEW_URL"
          if [ -z "$REVIEW_URL" ]; then
            echo "FAIL: review_url output is empty (expected changes to fire the notice)" >&2
            exit 1
          fi
          if printf '%s' "$REVIEW_URL" | grep -q 'base_file=specs%2Fbase.yaml'; then
            echo "PASS: ref prefix stripped from base"
          else
            echo "FAIL: base_file= did not have the git-ref prefix stripped (got: $REVIEW_URL)" >&2
            exit 1
          fi

