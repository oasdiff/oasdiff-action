name: 'Validate an OpenAPI spec'
description: 'Validate an OpenAPI spec against the spec, with per-finding PR annotations'
inputs:
  spec:
    description: 'Path of the OpenAPI spec in YAML or JSON format'
    required: true
  fail-on-finding:
    description: 'Fail with exit code 1 if any finding is reported (default: true)'
    required: false
    default: 'true'
  allow-external-refs:
    description: 'Allow external $refs in the spec; disable to prevent SSRF when validating untrusted specs'
    required: false
    default: 'true'
outputs:
  findings:
    description: 'Number of findings reported by validate (0 if the spec is well-formed)'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.spec }}
    - ${{ inputs.fail-on-finding }}
    - ${{ inputs.allow-external-refs }}
